<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviation Wiki</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <style>
        /* --- GLOBAL RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            height: 100vh;
            width: 100vw;
            background: radial-gradient(circle at center, #e0f2fe 0%, #bae6fd 40%, #7dd3fc 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- SEARCH BAR STYLES --- */
        .right-nav-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .search-container {
            position: relative; /* Essential for positioning the dropdown */
        }

        #search-input {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 8px 15px;
            border-radius: 20px;
            outline: none;
            width: 200px;
            color: #0f4c81;
            font-weight: 600;
            transition: width 0.3s;
        }

        #search-input:focus {
            background: rgba(255, 255, 255, 0.9);
            width: 240px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .search-dropdown {
            position: absolute;
            top: 110%; /* Just below the input */
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            overflow: hidden;
            display: none; /* Hidden by default */
            z-index: 200;
        }

        .search-option {
            padding: 10px 15px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #333;
            border-bottom: 1px solid #eee;
        }

        .search-option:hover {
            background: #e0f2fe; /* Light blue highlight */
        }

        .no-results {
            padding: 10px 15px;
            color: #777;
            font-style: italic;
            font-size: 0.9rem;
            cursor: default;
        }

        /* --- NEW: NAVIGATION BAR --- */
        .top-nav {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between; /* Pushes items to Left and Right */
            align-items: center;
            z-index: 100; /* Ensures it sits on top of everything */
        }

        /* Style for the Buttons (Home, Login, Register) */
        .nav-btn {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            padding: 10px 25px;
            border-radius: 30px;
            text-decoration: none; /* Removes underline */
            color: #0f4c81;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .nav-btn:hover {
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }


        .login-btn {
            background-color: #222;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* Container for Right side buttons so they stay together */
        .auth-buttons {
            display: flex;
            gap: 15px;
        }

        /* Style for the Main Title */
        .nav-title {
            font-size: 2rem;
            font-weight: 700;
            color: #0f4c81;
            text-decoration: none;
            /* Tricks to center it perfectly regardless of other buttons */
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            transition: opacity 0.3s;
        }
        
        .nav-title:hover {
            opacity: 0.8;
        }

        /* --- LAYOUT --- */
        .main-stage {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 98vw;
            max-width: none;
            height: 65%; 
            position: relative;
            margin-bottom: 1rem;
            gap: 40px;
        }

        /* --- GLASS CARDS --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 2rem;
            width: 33%;
            height: 80%;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            justify-content: flex-start; /* Changed to flex-start for scrolling */
        }

        .history-image-box {
            margin-top: 15px;       
            width: 100%;            
            height: 180px;          
            border-radius: 12px;    
            overflow: hidden;       
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            flex-shrink: 0;         
        }

        .history-image-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;  
        }

        .data-list p {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: #555;
            border-bottom: 1px solid #eee;
            padding-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        h2 { color: #0f4c81; margin-bottom: 1rem; font-size: 1.5rem; }

        /* --- HERO SECTION --- */
        .hero-section {
            width: 48%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        .sketchfab-embed-wrapper {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            overflow: hidden; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* --- BOTTOM NAV --- */
        .nav-dock {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            max-width: 90%;
            overflow-x: auto;
        }

        .thumbnail {
            width: 70px;
            height: 70px;
            min-width: 70px;
            border-radius: 12px;
            background: #fff;
            cursor: pointer;
            border: 2px solid transparent;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }
        
        .thumbnail img { width: 100%; }

        .thumbnail.active {
            border-color: #0f4c81;
            transform: scale(1.1);
        }


    </style>
</head>

<body>
    <nav class="top-nav">
        <a href="{{ url_for('home') }}" class="nav-btn" aria-label="Home">
            <span class="material-symbols-outlined">home</span>
        </a>
        
        <a href="{{ url_for('home') }}" class="nav-title">Aviation Wiki</a>

        <div class="right-nav-group">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search plane..." autocomplete="off">
                <div id="search-results" class="search-dropdown"></div>
            </div>

            <div class="auth-buttons">
                <a href="#" class="login-btn">Login / Register</a>
            </div>
        </div>
    </nav>

    <div class="main-stage">
        <div class="glass-card">
            <h2>Technical Data</h2>
            <div class="data-list">
                <p><span>Wingspan:</span> <strong id="wingspan">60.3m</strong></p>
                <p><span>Length:</span> <strong id="length">73.5m</strong></p>
                <p><span>Height:</span> <strong id="height">17.5m</strong></p>
                <p><span>Top Speed:</span> <strong id="speed">Mach 0.89</strong></p>
                <p><span>Range:</span> <strong id="range">15,000 km</strong></p>
                <p><span>Engines:</span> <strong id="engines">2x Rolls-Royce</strong></p>
            </div>
        </div>

        <div class="hero-section">
            <div class="sketchfab-embed-wrapper"> 
                <iframe 
                    id="sketchfab-frame"
                    title="Plane Model" 
                    allow="autoplay; fullscreen; xr-spatial-tracking" 
                    execution-while-out-of-viewport 
                    execution-while-not-rendered 
                    web-share 
                    src="https://sketchfab.com/models/0703224a1a7e497eaa2a860e1d3b1774/embed?autostart=1&ui_theme=dark"> 
                </iframe> 
            </div>
        </div>

        <div class="glass-card">
            <h2>History</h2>
            <div id="desc" style="line-height: 1.6; color: #666;">
                The Airbus A350 XWB is a family of long-range, wide-body airliners developed by Airbus.
            </div>
            <div class="history-image-box">
                <img id="info-image" src="https://upload.wikimedia.org/wikipedia/commons/f/f7/EGLF_-_Airbus_A350-941_-_F-WZNW.jpg" alt="Plane Info">
            </div>
        </div>
    </div>
    
    <div class="nav-dock">
        <div class="thumbnail active" onclick="changePlane(0)">
            <img src="https://ih1.redbubble.net/image.3682016204.1923/bg,f8f8f8-flat,750x,075,f-pad,750x1000,f8f8f8.webp" alt="Airbus A350">
        </div>
        <div class="thumbnail" onclick="changePlane(1)">
            <img src="https://www.shutterstock.com/image-vector/supermarine-spitfire-aircraft-vehicle-icon-260nw-1100894468.jpg" alt="Spitfire">
        </div>
        <div class="thumbnail" onclick="changePlane(2)">
            <img src="https://ih1.redbubble.net/image.3399010227.6338/bg,f8f8f8-flat,750x,075,f-pad,750x1000,f8f8f8.jpg" alt="Boeing 747-8">
        </div>
        <div class="thumbnail" onclick="changePlane(3)">
            <img src="https://cdn.shopify.com/s/files/1/1217/7182/collections/Screen_Shot_2019-01-25_at_14.05.10_eeb446e4-8e6b-49c1-afdd-45e5726ce8ec.png?v=1549074314" alt="F-16 Fighting Falcon">
        </div>
        <div class="thumbnail" onclick="changePlane(4)">
            <img src="https://an.aero/wp-content/uploads/2016/03/737-boeing-13-jpg.webp" alt="Boeing 737-800">
        </div>
        <div class="thumbnail" onclick="changePlane(5)">
            <img src="https://airmodels.net/c/61-category_default/airbus-a330.jpg" alt="Airbus A330-900neo">
        </div>
        <div class="thumbnail" onclick="changePlane(6)">
            <img src="https://cdn.shopify.com/s/files/1/1217/7182/collections/Airbus_A400M_995a24c0-2d72-4c7c-a8f9-46a04e797143.jpg?v=1549074320" alt="Airbus A400M">
        </div>
        <div class="thumbnail" onclick="changePlane(7)">
            <img src="https://cdn.shopify.com/s/files/1/1217/7182/collections/Antonov_AN-225_1c2d8ad9-3718-42c9-9791-7be7a40846ce.jpg?v=1549074327" alt="Antonov An-225 Mriya">
        </div>
    </div>

    <script>
        const planes = [
            {
                name: "Airbus A350", // <--- NEW PROPERTY
                id: "0703224a1a7e497eaa2a860e1d3b1774", 
                wingspan: "60.3m", length: "73.5m", height: "17.5m", engines: "2x Rolls-Royce",
                speed: "1,098 km/h", range: "15,000 km",
                desc: "The Airbus A350 XWB is a family of long-range, wide-body airliners developed by Airbus.",
                img: "https://upload.wikimedia.org/wikipedia/commons/f/f7/EGLF_-_Airbus_A350-941_-_F-WZNW.jpg"
            },
            {
                name: "Supermarine Spitfire",
                id: "8349f26e1e88455da75dd7352b02b794", 
                wingspan: "11.2m", length: "9.1m", height: "3.9m", engines: "1x Merlin",
                speed: "595 km/h", range: "760 km",
                desc: "The Supermarine Spitfire is a British single-seat fighter aircraft used by the Royal Air Force.",
                img: "https://media.gq-magazine.co.uk/photos/61e1ccb429520b6aa015bbe4/16:9/w_2560%2Cc_limit/SP0935.03-2-2.jpg"
            },
            {
                name: "Boeing 747-8",
                id: "86ec524a08e74e5e8907771c2d96b525", 
                wingspan: "68.4m", length: "76.3m", height: "19.4m", engines: "4x GEnx",
                speed: "988 km/h", range: "14,320 km",
                desc: "The Boeing 747 is a large, long-range wide-body airliner known as the Queen of the Skies.",
                img: "https://img.mako.co.il/2019/07/10/45389754903856092413_i.jpg"
            },
            {
                name: "F-16 Fighting Falcon",
                id: "8be8ab656304467eb6ddcbb244ae8574", 
                wingspan: "9.96m", length: "15.06m", height: "4.88m", engines: "1x F110-GE-129",
                speed: "2,120 km/h", range: "4,222 km",
                desc: "A highly versatile supersonic multirole fighter aircraft originally developed for the USAF.",
                img: "https://i0.wp.com/www.flyajetfighter.com/wp-content/uploads/2022/09/f-16-fighter-jet.jpg?ssl=1"
            },
            {
                name: "Boeing 737-800",
                id: "fa2d273dba0e45348284a6d6cd711218", 
                wingspan: "35.8m", length: "39.5m", height: "12.5m", engines: "2x CFM56-7B",
                speed: "876 km/h", range: "5,460 km",
                desc: "The world's most widely used narrow-body aircraft, reliable for short-to-medium haul flights.",
                img: "https://upload.wikimedia.org/wikipedia/commons/f/ff/Delta_Boeing_737-800_N371DA_departing_Boston_June_2025.jpg"
            },
            {
                name: "Airbus A330-900neo",
                id: "6174d5427cad49a981401cd421bc8be1", 
                wingspan: "64.0m", length: "63.66m", height: "16.79m", engines: "2x Trent 7000",
                speed: "918 km/h", range: "13,334 km",
                desc: "A modern wide-body airliner known for its efficiency and quiet cabin experience.",
                img: "https://upload.wikimedia.org/wikipedia/commons/c/c0/Airbus_A330neo_F-WTTN_37.jpg"
            },
            {
                name: "Airbus A400M",
                id: "ce45851ca78143eb836fcbe287e8d241", 
                wingspan: "42.4m", length: "45.1m", height: "14.7m", engines: "4x TP400-D6 turboprops",
                speed: "781 km/h", range: "3,300 km",
                desc: "A multi-national four-engine turboprop military transport aircraft.",
                img: "https://upload.wikimedia.org/wikipedia/commons/3/31/German_Air_Force_Airbus_A400M_%28out_cropped%29.jpg"
            },
            {
                name: "Antonov An-225",
                id: "bdea66835752483e8a9ea87e5f224122", 
                wingspan: "88.4m", length: "84.0m", height: "18.1m", engines: "6x Progress D-18T",
                speed: "850 km/h", range: "15,400 km",
                desc: "The heaviest aircraft ever built and the largest wingspan of any aircraft in operational service.",
                img: "https://images.aircharterservice.com/global/aircraft-guide/cargo-charter/antonov-an-225-5.jpg"
            }
        ];

        function changePlane(index) {
            const data = planes[index];
            
            // 1. Update Text
            document.getElementById('wingspan').innerText = data.wingspan;
            document.getElementById('length').innerText = data.length;
            document.getElementById('height').innerText = data.height;
            document.getElementById('engines').innerText = data.engines;
            document.getElementById('speed').innerText = data.speed;
            document.getElementById('range').innerText = data.range;
            document.getElementById('desc').innerText = data.desc;
            document.getElementById('info-image').src = data.img;

            // 3. Update Sketchfab Iframe
            const iframe = document.getElementById('sketchfab-frame');
            iframe.src = `https://sketchfab.com/models/${data.id}/embed?autostart=1&ui_theme=dark`;

            // 4. Update Active Button
            document.querySelectorAll('.thumbnail').forEach((t, i) => {
                if(i === index) t.classList.add('active');
                else t.classList.remove('active');
            });
        }


            // --- SEARCH FUNCTIONALITY ---
        const searchInput = document.getElementById('search-input');
        const resultsBox = document.getElementById('search-results');

        // 1. Listen for typing
        searchInput.addEventListener('input', function() {
            const query = this.value.toLowerCase().trim();
            resultsBox.innerHTML = ''; // Clear previous results

            if (query.length === 0) {
                resultsBox.style.display = 'none';
                return;
            }

            // Filter planes based on name
            const matches = planes.filter(plane => plane.name.toLowerCase().includes(query));

            if (matches.length > 0) {
                matches.forEach(match => {
                    const div = document.createElement('div');
                    div.classList.add('search-option');
                    div.innerText = match.name;
                    
                    // Click to switch plane
                    div.onclick = () => {
                        selectPlaneByName(match.name);
                    };
                    resultsBox.appendChild(div);
                });
            } else {
                // Display "No planes found"
                const div = document.createElement('div');
                div.classList.add('no-results');
                div.innerText = "No planes found";
                resultsBox.appendChild(div);
            }

            resultsBox.style.display = 'block';
        });

        // 2. Listen for "Enter" key
        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const query = this.value.toLowerCase().trim();
                const match = planes.find(plane => plane.name.toLowerCase().includes(query));
                
                if (match) {
                    selectPlaneByName(match.name);
                    this.blur(); // Remove focus from input
                }
            }
        });

        // 3. Helper to switch plane
        function selectPlaneByName(name) {
            const index = planes.findIndex(p => p.name === name);
            if (index !== -1) {
                changePlane(index);
                searchInput.value = ''; // Clear input
                resultsBox.style.display = 'none'; // Hide box
            }
        }

        // 4. Close dropdown when clicking outside
        document.addEventListener('click', function(e) {
            if (!searchInput.contains(e.target) && !resultsBox.contains(e.target)) {
                resultsBox.style.display = 'none';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviation Wiki</title>
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.png') }}">

    <style>
        /* --- GLOBAL RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            height: 100vh;
            width: 100vw;
            background: radial-gradient(circle at center, #e0f2fe 0%, #bae6fd 40%, #7dd3fc 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- LAYOUT --- */
        .main-stage {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 98vw;
            max-width: none;
            height: 65%; /* Increased height slightly for 3D model */
            position: relative;
            margin-bottom: 1rem;
            gap: 40px;
        }

        /* --- GLASS CARDS --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 2rem;
            width: 33%;
            height: 80%;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            justify-content: center;
        }

        /* ADD THIS NEW STYLE for the History Image */
        .history-image-box {
            margin-top: 15px;       /* Space between text and image */
            width: 100%;            /* Full width of the card */
            height: 180px;          /* Fixed height for uniformity */
            border-radius: 12px;    /* Rounded corners */
            overflow: hidden;       /* Hides parts of image that stick out */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            flex-shrink: 0;         /* Prevents the image from getting squished */
        }

        .history-image-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;  /* <--- CHANGED FROM 'cover' */
        }

        .data-list p {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: #555;
            border-bottom: 1px solid #eee;
            padding-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        h2 { color: #0f4c81; margin-bottom: 1rem; font-size: 1.5rem; }

        /* --- HERO SECTION (SKETCHFAB CONTAINER) --- */
        .hero-section {
            width: 48%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        /* Make the iframe fill the Hero Section */
        .sketchfab-embed-wrapper {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            overflow: hidden; /* Rounds the corners of the iframe */
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); /* Adds depth */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- BOTTOM NAV --- */
        .nav-dock {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .thumbnail {
            width: 70px; /* Made slightly bigger */
            height: 70px;
            min-width: 70px; /* Prevents squishing */
            border-radius: 12px;
            background: #fff;
            cursor: pointer;
            border: 2px solid transparent;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
                }
        
        .thumbnail img { width: 100%; }

        .thumbnail.active {
            border-color: #0f4c81;
            transform: scale(1.1);
        }

        .page-title {
            position: absolute; top: 5%; font-size: 2rem; color: #0f4c81; font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="page-title">Aviation Wiki</div>

    <div class="main-stage">
        <div class="glass-card">
            <h2>Technical Data</h2>
            <div class="data-list">
                <p><span>Wingspan:</span> <strong id="wingspan">60.3m</strong></p>
                <p><span>Length:</span> <strong id="length">73.5m</strong></p>
                <p><span>Height:</span> <strong id="height">17.5m</strong></p>
                <p><span>Top Speed:</span> <strong id="speed">Mach 0.89</strong></p>
                <p><span>Range:</span> <strong id="range">15,000 km</strong></p>
                <p><span>Engines:</span> <strong id="engines">2x Rolls-Royce</strong></p>
            </div>
            
        </div>

        <div class="hero-section">
            <div class="sketchfab-embed-wrapper"> 
                <iframe 
                    id="sketchfab-frame"
                    title="Plane Model" 
                    allow="autoplay; fullscreen; xr-spatial-tracking" 
                    execution-while-out-of-viewport 
                    execution-while-not-rendered 
                    web-share 
                    src="https://sketchfab.com/models/0703224a1a7e497eaa2a860e1d3b1774/embed?autostart=1&ui_theme=dark"> 
                </iframe> 
            </div>
        </div>

        <div class="glass-card">
            <h2>History</h2>
            <div id="desc" style="line-height: 1.6; color: #666;">
                The Airbus A350 XWB is a family of long-range, wide-body airliners developed by Airbus.
            </div>
            <div class="history-image-box">
                <img id="info-image" src="https://upload.wikimedia.org/wikipedia/commons/f/f7/EGLF_-_Airbus_A350-941_-_F-WZNW.jpg" alt="Plane Info">
            </div>
        </div>
    </div>
    

    <div class="nav-dock">
        <div class="thumbnail active" onclick="changePlane(0)">
            <img src="https://ih1.redbubble.net/image.3682016204.1923/bg,f8f8f8-flat,750x,075,f-pad,750x1000,f8f8f8.webp" alt="A350">
        </div>
        <div class="thumbnail" onclick="changePlane(1)">
            <img src="https://www.shutterstock.com/image-vector/supermarine-spitfire-aircraft-vehicle-icon-260nw-1100894468.jpg" alt="Spitfire">
        </div>
        <div class="thumbnail" onclick="changePlane(2)">
            <img src="https://ih1.redbubble.net/image.3399010227.6338/bg,f8f8f8-flat,750x,075,f-pad,750x1000,f8f8f8.jpg" alt="747">
        </div>
    </div>

    <script>
        
        const planes = [
            {
                // Plane 0: Airbus A350
                id: "0703224a1a7e497eaa2a860e1d3b1774", 
                wingspan: "60.3m", length: "73.5m", height: "17.5m", engines: "2x Rolls-Royce",
                speed: "Mach 0.89", range: "15,000 km", // NEW DATA
                desc: "The Airbus A350 XWB is a family of long-range, wide-body airliners developed by Airbus. It is the first Airbus to use carbon-fiber-reinforced polymers.",
                img: "https://upload.wikimedia.org/wikipedia/commons/f/f7/EGLF_-_Airbus_A350-941_-_F-WZNW.jpg"
            },
            {
                // Plane 1: Spitfire
                id: "8349f26e1e88455da75dd7352b02b794", 
                wingspan: "11.2m", length: "9.1m", height: "3.9m", engines: "1x Merlin",
                desc: "The Supermarine Spitfire is a British single-seat fighter aircraft used by the Royal Air Force.",
                img: "https://media.gq-magazine.co.uk/photos/61e1ccb429520b6aa015bbe4/16:9/w_2560%2Cc_limit/SP0935.03-2-2.jpg"
            },
            {
                // Plane 2: Boeing 747
                id: "86ec524a08e74e5e8907771c2d96b525", 
                wingspan: "68.4m", length: "76.3m", height: "19.4m", engines: "4x GEnx",
                desc: "The Boeing 747 is a large, long-range wide-body airliner known as the Queen of the Skies.",
                img: "https://img.mako.co.il/2019/07/10/45389754903856092413_i.jpg"
            }
        ];

        function changePlane(index) {
            const data = planes[index];
            
            // 1. Update Text
            document.getElementById('wingspan').innerText = data.wingspan;
            document.getElementById('length').innerText = data.length;
            document.getElementById('height').innerText = data.height;
            document.getElementById('engines').innerText = data.engines;
            document.getElementById('speed').innerText = data.speed;
            document.getElementById('range').innerText = data.range;
            document.getElementById('desc').innerText = data.desc;
            document.getElementById('info-image').src = data.img;


            // 3. Update Sketchfab Iframe
            const iframe = document.getElementById('sketchfab-frame');
            iframe.src = `https://sketchfab.com/models/${data.id}/embed?autostart=1&ui_theme=dark`;

            // 4. Update Active Button
            document.querySelectorAll('.thumbnail').forEach((t, i) => {
                if(i === index) t.classList.add('active');
                else t.classList.remove('active');
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Lobby - Aviation Wiki</title>
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.png') }}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>

    <style>
        /* --- איפוס ועיצוב כללי --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            height: 100vh;
            width: 100vw;
            background-image: url("{{ url_for('static', filename='images/home_background.avif') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
        }

        /* --- ניווט (Navbar) --- */
        nav {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .logo { font-size: 1.5rem; font-weight: 700; color: #004aad; }
        .nav-btn {
            text-decoration: none;
            color: #d9534f;
            border: 2px solid #d9534f;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .nav-btn:hover { background: #d9534f; color: white; }

        /* --- פריסת הלובי --- */
        .lobby-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 80px;
            padding: 50px 20px;
            margin: auto;
            max-width: 95%;
            width: 100%;
        }

        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .transparent-title {
            color: #004aad;
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 2px solid #004aad;
            padding-bottom: 10px;
            text-shadow: 2px 2px 5px rgba(255, 255, 255, 0.8), -2px -2px 5px rgba(255, 255, 255, 0.8);
        }

        /* --- צד שמאל: רשימת חדרים --- */
        .rooms-column {
            height: fit-content; 
        }
        .rooms-list {
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 50vh; 
            padding-right: 5px; 
        }
        
        .rooms-list::-webkit-scrollbar { width: 6px; }
        .rooms-list::-webkit-scrollbar-track { background: transparent; }
        .rooms-list::-webkit-scrollbar-thumb { background: #004aad; border-radius: 3px; }

        .room-item {
            background: rgba(240, 248, 255, 0.95);
            border: 1px solid #004aad;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .join-btn {
            background: #004aad;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .join-btn:hover { background: #0f4c81; }

        /* --- אמצע: פעולות --- */
        .actions-column {
            align-items: center;
            gap: 30px; /* קצת פחות רווח כי יש לנו יותר אלמנטים עכשיו */
        }
        
        /* אזור הגדרות יצירת חדר */
        .create-room-section {
            width: 100%;
            max-width: 300px;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #004aad;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .settings-label {
            font-weight: 600;
            color: #004aad;
            font-size: 1.1rem;
        }

        .players-select {
            padding: 5px 10px;
            border: 2px solid #004aad;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            color: #333;
            outline: none;
            cursor: pointer;
        }

        /* כפתורי ה-Toggle (Public/Private) */
        .toggle-container {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        
        .toggle-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #ccc;
            background: #f4f4f4;
            color: #666;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* המצב הדלוק (אור ירוק) */
        .toggle-btn.active {
            border-color: #2ecc71;
            background: #eafaf1;
            color: #27ae60;
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.5); /* הילת האור הירוק */
        }

        .action-btn {
            background: linear-gradient(180deg, #ffffff 20%, #89c4f4 100%);
            color: #004aad;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s;
            width: 100%;
            border: 2px solid #004aad;
            margin-top: 5px;
        }
        .action-btn:hover { transform: translateY(-3px); }
        
        /* אזור הצטרפות לחדר */
        .join-code-section {
            width: 100%;
            max-width: 300px;
            text-align: center;
            border-top: 3px dashed #004aad;
            padding-top: 25px;
        }
        .code-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #004aad;
            border-radius: 10px;
            font-size: 1.2rem;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 15px;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            font-weight: bold;
        }
        .code-input:focus { box-shadow: 0 0 10px #89c4f4; }

        /* --- צד ימין: סטטיסטיקות --- */
        .stats-card {
            background: rgba(220, 224, 230, 0.95);
            border-radius: 0;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            border: 1px solid #999;
            height: fit-content;
        }
        .stats-title {
            color: #333;
            font-size: 1.6rem;
            margin-bottom: 25px;
            text-align: center;
            border-bottom: 2px solid #666;
            padding-bottom: 10px;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            background: #ffffff;
            padding: 15px;
            border-radius: 0;
            margin-bottom: 15px;
            font-size: 1.1rem;
            border-left: 5px solid #004aad;
            border-bottom: 1px solid #ccc;
            border-right: 1px solid #ccc;
            border-top: 1px solid #ccc;
        }
        .stat-label { font-weight: 600; color: #444; }
        .stat-value { font-weight: 700; color: #004aad; }

    </style>
</head>
<body>

    <nav>
        <div class="logo">Aviation Wiki</div>
        <div>
            <span style="color: #0f4c81; font-weight: 700; margin-right: 15px;">
                Hello, {{ session['username'] }}
            </span>
            <a href="/" class="nav-btn" style="border-color: #004aad; color: #004aad; margin-right: 10px;">Home</a>
            <a href="{{ url_for('logout') }}" class="nav-btn">Logout</a>
        </div>
    </nav>

    <div class="lobby-container">
        
        <div class="column rooms-column">
            <h2 class="transparent-title">Public Rooms</h2>
            <div class="rooms-list" id="public-rooms-list">
                <div class="room-item" style="opacity: 0.8; text-align: center; display: block; font-weight: bold;">
                    Waiting for rooms...
                </div>
            </div>
        </div>

        <div class="column actions-column">
            
            <div class="create-room-section">
                
                <div class="settings-row">
                    <span class="settings-label">Max Players:</span>
                    <select id="max-players-select" class="players-select">
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>

                    </select>
                </div>

                <div class="toggle-container">
                    <button class="toggle-btn active" id="btn-public" onclick="setRoomType('public')">Public</button>
                    <button class="toggle-btn" id="btn-private" onclick="setRoomType('private')">Private</button>
                </div>

                <button class="action-btn" id="create-room-btn">
                    ➕ Create New Room
                </button>
            </div>

            <div class="join-code-section">
                <input type="text" id="room-code-input" class="code-input" placeholder="Enter Room Code" maxlength="4">
                <button class="action-btn" id="join-room-btn" style="padding: 15px; font-size: 1.1rem;">
                    🚀 Join Room
                </button>
            </div>
        </div>

        <div class="column stats-card stats-column">
            <h2 class="stats-title">{{ session['username'] }}'s Stats</h2>
            
            <div class="stat-item">
                <span class="stat-label">Wins:</span>
                <span class="stat-value">{{ stats.wins }}</span>
            </div>
            
            <div class="stat-item">
                <span class="stat-label">Games Played:</span>
                <span class="stat-value">{{ stats.games_played }}</span>
            </div>
            
            <div class="stat-item">
                <span class="stat-label">Total Correct:</span>
                <span class="stat-value">{{ stats.total_correct_answers }}</span>
            </div>
        </div>

    </div>

<script src="{{ url_for('static', filename='js/lobby.js') }}"></script>
</body>
</html>

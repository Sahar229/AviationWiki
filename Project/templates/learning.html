        /* --- 1. GLOBAL RESET & FONTS --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- 2. THE STAGE (BACKGROUND) --- */
        body {
            height: 100vh;
            width: 100vw;
            /* Radial Gradient to create the spotlight effect */
            background: radial-gradient(circle at center, #e0f2fe 0%, #bae6fd 40%, #7dd3fc 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

        .main-stage {

            height: 60%;

            margin-bottom: 2rem;

        /* --- 4. GLASSMORPHISM CARDS --- */
        .glass-card {

            -webkit-backdrop-filter: blur(12px); /* Safari support */
            border-radius: 24px;
            padding: 2rem;
            width: 25%; /* Left/Right columns take 25% */
            height: 80%;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1); /* Soft shadow */
            border: 1px solid rgba(255, 255, 255, 0.5); /* Subtle border */
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px); /* Micro-interaction */
        }

        h2 {

            margin-bottom: 1.5rem;

            letter-spacing: 1px;

            margin-bottom: 1rem;

            padding-bottom: 0.5rem;
        }

        .description {
            color: #666;
            line-height: 1.6;
            font-size: 0.9rem;
        }

        /* --- 5. THE HERO (CENTER PLANE) --- */
        .hero-section {
            width: 45%; /* Center takes more space */
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10; /* Ensures plane floats "above" side cards */
        }

        .plane-img {
            width: 120%; /* Make it pop out of its container */
            max-width: 600px;
            /* Drop shadow specifically for the object to add 3D feel */
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.3)); 
            transition: all 0.5s ease-out;
            cursor: pointer;
        }

        .plane-img:hover {
            transform: scale(1.05) rotate(2deg);
        }

        /* The Ground Shadow */
        .shadow-oval {
            width: 60%;
            height: 20px;
            background: black;
            border-radius: 50%;
            opacity: 0.2;
            filter: blur(15px);
            margin-top: -40px; /* Pull it up under the plane */
        }

        /* --- 6. BOTTOM NAVIGATION (CAROUSEL) --- */
        .nav-dock {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px; /* Pill shape */
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .nav-btn {
            background: none;
            border: none;
            color: #0f4c81;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0 10px;
        }

        .thumbnail {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .thumbnail img {
            width: 90%;
            height: auto;
        }

        /* The "Active" state */
        .thumbnail.active {
            border-color: #0f4c81;
            transform: scale(1.1);
            box-shadow: 0 4px 10px rgba(15, 76, 129, 0.2);
        }

        /* --- TITLE --- */
        .page-title {
            position: absolute;
            top: 5%;
            font-size: 2rem;
            color: #0f4c81;
            font-weight: 600;
        }

        /* --- RESPONSIVE MOBILE TWEAKS --- */
        @media (max-width: 768px) {
            .main-stage {
                flex-direction: column;
                height: auto;
                margin-top: 80px;
            }
            .glass-card, .hero-section {
                width: 90%;
                margin-bottom: 20px;
            }
            .plane-img { width: 100%; }
        }
    </style>
</head>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviation Wiki - Sketchfab Edition</title>
    <style>
        /* --- GLOBAL RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            height: 100vh;
            width: 100vw;
            background: radial-gradient(circle at center, #e0f2fe 0%, #bae6fd 40%, #7dd3fc 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- LAYOUT --- */
        .main-stage {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 90%;
            max-width: 1200px;
            height: 65%; /* Increased height slightly for 3D model */
            position: relative;
            margin-bottom: 1rem;
        }

        /* --- GLASS CARDS --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 2rem;
            width: 25%;
            height: 80%;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .data-list p {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: #555;
            border-bottom: 1px solid #eee;
            padding-bottom: 0.5rem;
        }

        h2 { color: #0f4c81; margin-bottom: 1rem; }

        /* --- HERO SECTION (SKETCHFAB CONTAINER) --- */
        .hero-section {
            width: 48%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        /* Make the iframe fill the Hero Section */
        .sketchfab-embed-wrapper {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            overflow: hidden; /* Rounds the corners of the iframe */
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); /* Adds depth */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- BOTTOM NAV --- */
        .nav-dock {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .thumbnail {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: #fff;
            cursor: pointer;
            border: 2px solid transparent;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .thumbnail img { width: 100%; }

        .thumbnail.active {
            border-color: #0f4c81;
            transform: scale(1.1);
        }

        .page-title {
            position: absolute; top: 5%; font-size: 2rem; color: #0f4c81; font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="page-title">Aviation Wiki</div>

    <div class="main-stage">
        <div class="glass-card">
            <h2>Technical Data</h2>
            <div class="data-list">
                <p><span>Wingspan:</span> <strong id="wingspan">60.3m</strong></p>
                <p><span>Length:</span> <strong id="length">73.5m</strong></p>
                <p><span>Height:</span> <strong id="height">17.5m</strong></p>
                <p><span>Engines:</span> <strong id="engines">2x Rolls-Royce</strong></p>
            </div>
        </div>

        <div class="hero-section">
            <div class="sketchfab-embed-wrapper"> 
                <iframe 
                    id="sketchfab-frame"
                    title="Plane Model" 
                    allow="autoplay; fullscreen; xr-spatial-tracking" 
                    execution-while-out-of-viewport 
                    execution-while-not-rendered 
                    web-share 
                    /* The src below is the default starting plane */
                    src="https://sketchfab.com/models/cfa2836ead8c4278a199a7d34a87f02e/embed?autostart=1&ui_theme=dark"> 
                </iframe> 
            </div>
        </div>

        <div class="glass-card">
            <h2>History</h2>
            <div id="desc" style="line-height: 1.6; color: #666;">
                The Airbus A350 XWB is a family of long-range, wide-body airliners developed by Airbus.
            </div>
        </div>
    </div>

    <div class="nav-dock">
        <div class="thumbnail active" onclick="changePlane(0)">
            <img src="https://via.placeholder.com/50?text=A350" alt="A350">
        </div>
        <div class="thumbnail" onclick="changePlane(1)">
            <img src="https://via.placeholder.com/50?text=Spit" alt="Spitfire">
        </div>
        <div class="thumbnail" onclick="changePlane(2)">
            <img src="https://via.placeholder.com/50?text=747" alt="747">
        </div>
    </div>

    <script>
        // --- HOW TO GET THE ID ---
        // Look at your link: https://sketchfab.com/models/cfa2836ead8c4278a199a7d34a87f02e/embed
        // The ID is the random code: "cfa2836ead8c4278a199a7d34a87f02e"
        
        const planes = [
            {
                // Plane 0: Airbus A350 (Your link)
                id: "0703224a1a7e497eaa2a860e1d3b1774", 
                wingspan: "60.3m", length: "73.5m", height: "17.5m", engines: "2x Rolls-Royce",
                desc: "The Airbus A350 XWB is a family of long-range, wide-body airliners."
            },
            {
                // Plane 1: Spitfire (Example ID)
                id: "8349f26e1e88455da75dd7352b02b794", 
                wingspan: "11.2m", length: "9.1m", height: "3.9m", engines: "1x Merlin",
                desc: "The Supermarine Spitfire is a British single-seat fighter aircraft used by the Royal Air Force."
            },
            {
                // Plane 2: Boeing 747 (Example ID)
                id: "b92f9663faac40a0ab992b6294345eae", 
                wingspan: "68.4m", length: "76.3m", height: "19.4m", engines: "4x GEnx",
                desc: "The Boeing 747 is a large, long-range wide-body airliner known as the Queen of the Skies."
            }
        ];

        function changePlane(index) {
            const data = planes[index];
            
            // 1. Update Text
            document.getElementById('wingspan').innerText = data.wingspan;
            document.getElementById('length').innerText = data.length;
            document.getElementById('height').innerText = data.height;
            document.getElementById('engines').innerText = data.engines;
            document.getElementById('desc').innerText = data.desc;

            // 2. Update Sketchfab Iframe
            const iframe = document.getElementById('sketchfab-frame');
            
            // We build the new URL using the ID from our list
            // "autostart=1" makes it load immediately
            iframe.src = `https://sketchfab.com/models/${data.id}/embed?autostart=1&ui_theme=dark`;

            // 3. Update Active Button
            document.querySelectorAll('.thumbnail').forEach((t, i) => {
                if(i === index) t.classList.add('active');
                else t.classList.remove('active');
            });
        }
    </script>
</body>
</html>

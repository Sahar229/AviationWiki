<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Aviation Wiki</title>
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="auth-body">

    <div class="auth-card" id="step-1">
        <h2>Forgot Your Password</h2>
        <form>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="Enter your Email Address">
            </div>
            <button type="button" class="submit-btn" onclick="sendCode()">Send Code</button>
        </form>
        <div class="links">
            <a href="{{ url_for('auth.login_page') }}">Return to Login Page</a>
        </div>
        <div class="alert alert-error" id="error-msg-1" style="display: none;"></div>
    </div>

    <div class="auth-card" id="step-2" style="display: none;">
        <h2>Enter Verification Code</h2>
        <p>A code was sent to your email.</p>
        <form>
            <div class="form-group">
                <label for="reset-code">Enter Verification Code</label>
                <input type="text" id="reset-code" name="reset-code" required placeholder="Enter 6-digit code">
            </div>
            <button type="button" class="submit-btn" onclick="verifyCode()">Verify Code</button>
        </form>
        <p style="margin-top: 25px; margin-bottom: 25px;">You have 10 minutes before the code expires</p>
        <div class="alert alert-error" id="error-msg-2" style="display: none;"></div>
    </div>

    <div class="auth-card" id="step-3" style="display: none;">
        <h2>Create New Password</h2>
        <form>

            <div class="form-group">
                <label for="new_password">Enter New Password</label>
                <input type="password" id="new_password" name="new_password" required placeholder="Choose a New Password">
                <small id="password-hint" style="display: none; color: #666; margin-top: 5px;">Password Must Be At Least 6 Characters</small>
            </div>
                        
            <div class="form-group">
                <label for="new_password2">Repeat New Password</label>
                <input type="password" id="new_password2" name="new_password2" required placeholder="Repeat The New Password">
            </div>

            <button type="button" class="submit-btn" onclick="updatePassword()">Submit New Password</button>
        </form>
        <div class="alert alert-error" id="error-msg-3" style="display: none;"></div>
        <div class="alert alert-success" id="success-msg" style="display: none;"></div>
    </div>
</body>

<script>
    // פונקציית עזר לשליחת בקשות לפלאסק (חוסכת כפילות קוד)
    async function sendPostRequest(action, extraData = {}) {
        const payload = { action: action, ...extraData };
        console.log(payload)
        const response = await fetch('/forgot_password', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        });
        return await response.json();
    }

    // שלב 1: מבקש מהשרת לשלוח מייל
    async function sendCode() {
        const email = document.getElementById('email').value;
        const result = await sendPostRequest('send_code', { email: email });
        
        if (result.status === 'ok') {
            // החלפת תצוגה
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
        } else {
            document.getElementById('error-msg-1').style.display = 'block';
            document.getElementById('error-msg-1').innerText = result.message;
        }
    }

    // שלב 2: מבקש מהשרת לבדוק אם הקוד תקין
    async function verifyCode() {
        const code = document.getElementById('reset-code').value;
        const result = await sendPostRequest('verify_code', { code: code });
        
        if (result.status === 'ok') {
            // החלפת תצוגה
            document.getElementById('step-2').style.display = 'none';
            document.getElementById('step-3').style.display = 'block';
        } else {
            document.getElementById('error-msg-2').style.display = 'block';
            document.getElementById('error-msg-2').innerText = result.message;
        }
    }

    // שלב 3: מעדכן את הסיסמה בשרת
    async function updatePassword() {
        const newPassword = document.getElementById('new_password').value;
        const newPassword2 = document.getElementById('new_password2').value;
        const result = await sendPostRequest('update_password', { new_password: newPassword, new_password2: newPassword2});
        document.getElementById('error-msg-3').style.display = 'none';
        
        if (result.status === 'ok') {
            document.getElementById('success-msg').style.display = 'block';
            document.getElementById('success-msg').innerText = result.message;
            setTimeout(function() {
                    window.location.href = "/login";
                }, 1500);
        } else {
            document.getElementById('error-msg-3').innerText = result.message;
            document.getElementById('error-msg-3').style.display = 'block';
        }
    }

    const passwordInput = document.getElementById('new_password');
    const passwordHint = document.getElementById('password-hint');

    passwordInput.addEventListener('focus', function() {
        passwordHint.style.display = 'block';
    });

    passwordInput.addEventListener('blur', function() {
        passwordHint.style.display = 'none';
        });
</script>

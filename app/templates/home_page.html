<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviation Wiki</title>
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <style>

        /* מסך כפתורים */
        .container {
            display: flex;
            height: 80%; /* Takes up rest of the screen height */
            justify-content: center; /* Center horizontally */
            align-items: center;     /* Center vertically */
            gap: 40px; /* Space between the two buttons */
        }

        /* עיצוב כפתורים */
        .card-button {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 220px;
            height: 120px;
            text-decoration: none;
            color: #222;
            font-weight: 700;
            font-size: 1.2rem;
            
            background: linear-gradient(180deg, #ffffff 20%, #89c4f4 100%);
            
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0, 76, 175, 0.3); 
            transition: transform 0.2s ease; 
        }

        .card-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 74, 173, 0.5);
        }

    </style>
</head>
<body class="home-body">

    <nav class="nav-transparent">
        <div class="logo">Aviation Wiki</div>
        <div class="auth-buttons">
            {% if 'username' in session %}
                <span class="username">Hello, {{ session['username'] }}</span>
                <a href="{{ url_for('auth.logout') }}" class="nav-btn logout-btn">Logout</a>
            {% else %}
                <a href="{{ url_for('auth.login_page') }}" class="login-btn">Login / Register</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        <a href="{{ url_for('main.learning_page') }}" class="card-button">Learning Area</a>
        <a href="{{ url_for('main.quiz_lobby') }}" class="card-button">Quiz Area</a>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tutor - Aviation Wiki</title>
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <style>

        .nav-center {
            font-size: 1.8rem;
            font-weight: 700;
            color: #5c00ad;
        }

        /* עיצוב חלון הצאט */
        .chat-container {
            width: 60%;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            height: 60vh;
            direction: ltr;
        }

        .chat-messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            border-bottom: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 10px;
            max-width: 80%;
            line-height: 1.5;
        }

        .user-msg {
            background: #004aad;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 0;
        }

        .ai-msg {
            background: #e0f7fa;
            color: #333;
            margin-right: auto;
            border-bottom-left-radius: 0;
        }

        .chat-input-area {
            display: flex;
            padding: 15px;
            gap: 10px;
            background: #fff;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            align-items: flex-end;
        }

        .chat-input-area textarea {
            flex-grow: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
            min-height: 100px; 
            resize: vertical; 
            font-family: inherit; 
            line-height: 1.4;
        }
        .chat-input-area textarea:focus {
            outline: none;
            border-color: #004aad;
            box-shadow: 0 0 5px rgba(0, 74, 173, 0.2);
        }

        .chat-input-area button {
            padding: 10px 20px;
            background: #004aad;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            height: fit-content;
        }

        .chat-input-area button:hover {
            background: #003080;
        }
    </style>
</head>

<body>

    <nav>
        <a href="{{ url_for('main.home') }}" class="logo">Aviation Wiki</a>

        <div class="nav-center center-absolute">
            Learn from your mistakes
        </div>

        <div class="auth-buttons">
            <span class="username">Hello, {{ session['username'] }}</span>
            <a href="/" class="nav-btn">Home</a>
            <a href="{{ url_for('auth.logout') }}" class="nav-btn logout-btn">Logout</a>
        </div>
    </nav>


    <div class="chat-container">
        <div class="chat-messages" id="chat-messages">
            <div class="message ai-msg">
                Hello {{ session.get('username') }}! I am your AI Aviation Tutor. I see you've finished the game, let's review your mistakes.
            </div>
        </div>
        <div class="chat-input-area">
            <textarea id="chat-input" rows="4" placeholder="Ask me to explain a mistake..." onkeypress="handleKeyPress(event)"></textarea>
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
    <script> const serverMistakes = {{ mistakes | tojson }}; </script>
    <script src="{{ url_for('static', filename='js/learn_from_mistakes.js') }}"></script>

</body>

</html>
